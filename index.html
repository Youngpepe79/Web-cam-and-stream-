<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Webcam Outline Overlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* Webcam outline box */
    .cam-outline {
      width: 640px;
      height: 360px;
      border: 4px solid rgba(0, 255, 204, 0.9);
      border-radius: 18px;
      box-shadow:
        0 0 12px rgba(0, 255, 204, 0.6),
        inset 0 0 10px rgba(0, 255, 204, 0.4);
      box-sizing: border-box;
      background: transparent;
    }
  </style>
</head>
<body>

  <div class="cam-outline"></div>

</body>
</html>
